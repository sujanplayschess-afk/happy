
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title id="page-title">For Her — A Music Video</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#08070d;--warm:#f5ede0;--amber:#e8a96a;--rose:#d4898a;--blue:#7aafd4;
  --fh:'Playfair Display',serif;--fb:'DM Sans',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);font-family:var(--fb);color:var(--warm);user-select:none;}

/* GRAIN */
#grain{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.038;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:150px;animation:grn .4s steps(3) infinite;}
@keyframes grn{0%{transform:translate(0,0)}33%{transform:translate(-3%,2%)}66%{transform:translate(2%,-3%)}100%{transform:translate(-1%,1%)}}

/* VIGNETTE */
#vig{position:fixed;inset:0;z-index:9998;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 45%,rgba(8,7,13,.65) 100%);}

/* INTRO */
#intro{position:fixed;inset:0;z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink);transition:opacity 2s ease,visibility 2s ease;}
#intro.gone{opacity:0;visibility:hidden;pointer-events:none;}
.i-pre{font-family:var(--fb);font-weight:200;font-size:clamp(9px,1.1vw,11px);letter-spacing:.4em;text-transform:uppercase;color:var(--amber);opacity:0;animation:riseIn 1s .4s forwards;}
.i-title{font-family:var(--fh);font-style:italic;font-weight:300;font-size:clamp(3.5rem,8vw,7rem);color:var(--warm);line-height:1.05;text-align:center;opacity:0;animation:riseIn 1.2s .9s forwards;}
.i-title em{color:var(--amber);}
.i-rule{width:1px;height:52px;background:var(--amber);opacity:0;margin:1.8rem 0;animation:fadeIn .8s 1.8s forwards;}
.i-sub{font-family:var(--fb);font-weight:200;font-size:clamp(10px,1.1vw,12px);letter-spacing:.28em;text-transform:uppercase;color:rgba(245,237,224,.45);opacity:0;animation:fadeIn .8s 2.1s forwards;margin-bottom:2.8rem;}
.pbtn{display:flex;align-items:center;gap:13px;padding:13px 36px;border:1px solid rgba(232,169,106,.35);background:rgba(232,169,106,.05);backdrop-filter:blur(8px);border-radius:2px;cursor:pointer;color:var(--amber);font-family:var(--fb);font-weight:300;font-size:11px;letter-spacing:.28em;text-transform:uppercase;opacity:0;animation:fadeIn .8s 2.6s forwards;transition:all .45s ease;}
.pbtn:hover{background:rgba(232,169,106,.12);border-color:rgba(232,169,106,.7);letter-spacing:.34em;}
.ptri{width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:9px solid var(--amber);flex-shrink:0;}

/* PROGRESS */
#pw{position:fixed;top:0;left:0;right:0;z-index:4000;height:2px;background:rgba(245,237,224,.05);opacity:0;transition:opacity 1s .5s;}
#pw.on{opacity:1;}
#pb{height:100%;width:0%;background:linear-gradient(to right,var(--rose),var(--amber));box-shadow:0 0 10px rgba(232,169,106,.7);transition:width .25s linear;}

/* SONG LABEL */
#slbl{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:4000;font-family:var(--fb);font-weight:200;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(232,169,106,.5);opacity:0;transition:opacity .6s;white-space:nowrap;}
#slbl.on{opacity:1;}

/* COUNTER */
#ctr{position:fixed;bottom:26px;right:28px;z-index:4000;font-family:var(--fb);font-weight:200;font-size:10px;letter-spacing:.2em;color:rgba(245,237,224,.22);opacity:0;transition:opacity 1s;}
#ctr.on{opacity:1;}

/* MUSIC BARS */
#mbars{position:fixed;bottom:26px;left:28px;z-index:4000;display:flex;align-items:flex-end;gap:3px;height:18px;opacity:0;transition:opacity .8s;}
#mbars.on{opacity:1;}
.mb{width:2px;border-radius:2px;background:rgba(232,169,106,.5);animation:mba 1s ease-in-out infinite alternate;}
.mb:nth-child(1){height:5px;animation-duration:.9s;animation-delay:0s}
.mb:nth-child(2){height:14px;animation-duration:1.1s;animation-delay:.15s}
.mb:nth-child(3){height:9px;animation-duration:.8s;animation-delay:.3s}
.mb:nth-child(4){height:16px;animation-duration:1.2s;animation-delay:.1s}
.mb:nth-child(5){height:7px;animation-duration:.95s;animation-delay:.25s}
@keyframes mba{from{transform:scaleY(.25)}to{transform:scaleY(1)}}

/* STAGE */
#stage{position:fixed;inset:0;z-index:1;}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 1.5s cubic-bezier(.4,0,.2,1);will-change:opacity;}
.slide.active{opacity:1;}
.sbg{position:absolute;inset:-10%;background-size:cover;background-position:center;will-change:transform;}
.kb-zi{animation:kbZI 20s ease-out forwards;}
.kb-zo{animation:kbZO 20s ease-out forwards;}
.kb-pr{animation:kbPR 20s ease-out forwards;}
.kb-pl{animation:kbPL 20s ease-out forwards;}
.kb-du{animation:kbDU 20s ease-out forwards;}
@keyframes kbZI{from{transform:scale(1)}to{transform:scale(1.14)}}
@keyframes kbZO{from{transform:scale(1.14)}to{transform:scale(1)}}
@keyframes kbPR{from{transform:scale(1.08) translateX(-4%)}to{transform:scale(1.08) translateX(4%)}}
@keyframes kbPL{from{transform:scale(1.08) translateX(4%)}to{transform:scale(1.08) translateX(-4%)}}
@keyframes kbDU{from{transform:scale(1.06) translateY(-3%)}to{transform:scale(1.06) translateY(3%)}}
.sovl{position:absolute;inset:0;background:linear-gradient(160deg,rgba(8,7,13,.1) 0%,rgba(8,7,13,.04) 40%,rgba(8,7,13,.7) 100%);}
.stint{position:absolute;inset:0;mix-blend-mode:multiply;}

/* LYRIC SYSTEM */
.lw{position:absolute;z-index:10;max-width:min(740px,88vw);}
.pos-bl{bottom:12%;left:6%;text-align:left;}
.pos-bc{bottom:12%;left:50%;transform:translateX(-50%);text-align:center;}
.pos-br{bottom:12%;right:6%;text-align:right;}
.pos-ml{top:50%;left:6%;transform:translateY(-50%);text-align:left;}
.pos-mc{top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.pos-tl{top:15%;left:6%;text-align:left;}
.pos-tc{top:15%;left:50%;transform:translateX(-50%);text-align:center;}
.pos-tr{top:15%;right:6%;text-align:right;}
.ll{display:block;font-family:var(--fh);font-style:italic;font-weight:300;
  font-size:clamp(1.5rem,3.3vw,2.9rem);line-height:1.42;color:var(--warm);
  text-shadow:0 3px 40px rgba(0,0,0,.92),0 1px 8px rgba(0,0,0,.8);
  opacity:0;transform:translateY(18px);
  transition:opacity 1.1s ease,transform 1.1s ease;}
.ll.in{opacity:1;transform:translateY(0);}
.ll.out{opacity:0;transform:translateY(-10px);transition:opacity .8s ease,transform .8s ease;}
.ll.gold{color:var(--amber);}
.ll.rose{color:#e8b0b0;}
.ll.blue{color:#a4cce4;}
.ll.big{font-size:clamp(2.1rem,5.2vw,4.8rem);font-weight:400;}
.ll.sm{font-size:clamp(.9rem,1.8vw,1.4rem);font-style:normal;font-family:var(--fb);font-weight:200;letter-spacing:.06em;}
.ll.caps{font-style:normal;letter-spacing:.28em;font-size:clamp(.7rem,1vw,.95rem);font-family:var(--fb);font-weight:200;}
.d1{transition-delay:.25s}.d2{transition-delay:.75s}.d3{transition-delay:1.25s}.d4{transition-delay:1.75s}

/* END CARD */
#ec{position:fixed;inset:0;z-index:4500;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink);opacity:0;pointer-events:none;transition:opacity 2.5s ease;}
#ec.on{opacity:1;pointer-events:all;}
.e-pre{font-family:var(--fb);font-weight:200;font-size:10px;letter-spacing:.45em;text-transform:uppercase;color:var(--amber);opacity:0;}
#ec.on .e-pre{animation:riseIn 1.2s .5s forwards;}
.e-msg{font-family:var(--fh);font-style:italic;font-size:clamp(2.4rem,6vw,5.5rem);font-weight:300;color:var(--warm);text-align:center;line-height:1.2;margin:.9rem 0 .2rem;opacity:0;}
#ec.on .e-msg{animation:riseIn 1.4s 1s forwards;}
.e-sub{font-family:var(--fh);font-style:italic;font-weight:300;font-size:clamp(1rem,2.1vw,1.5rem);color:var(--amber);opacity:0;}
#ec.on .e-sub{animation:riseIn 1.2s 1.6s forwards;}
.e-rule{width:60px;height:1px;background:var(--amber);margin:2rem auto;opacity:0;}
#ec.on .e-rule{animation:fadeIn .8s 2.2s forwards;}
.e-note{font-family:var(--fb);font-weight:200;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(245,237,224,.35);text-align:center;opacity:0;}
#ec.on .e-note{animation:fadeIn .8s 2.6s forwards;}
.rbtn{margin-top:2.5rem;padding:11px 32px;background:transparent;border:1px solid rgba(232,169,106,.22);color:rgba(232,169,106,.45);font-family:var(--fb);font-weight:200;font-size:10px;letter-spacing:.28em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .4s;opacity:0;}
#ec.on .rbtn{animation:fadeIn .8s 3.2s forwards;}
.rbtn:hover{border-color:var(--amber);color:var(--amber);}

/* LOADING */
#loader{position:fixed;inset:0;z-index:6000;background:var(--ink);display:flex;align-items:center;justify-content:center;transition:opacity .8s ease,visibility .8s ease;}
#loader.gone{opacity:0;visibility:hidden;pointer-events:none;}
.loader-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);margin:0 4px;animation:ldot 1.2s ease-in-out infinite;}
.loader-dot:nth-child(1){animation-delay:0s}
.loader-dot:nth-child(2){animation-delay:.2s}
.loader-dot:nth-child(3){animation-delay:.4s}
@keyframes ldot{0%,80%,100%{transform:scale(0.4);opacity:.3}40%{transform:scale(1);opacity:1}}

/* KEYFRAMES */
@keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* MOBILE */
@media(max-width:600px){
  .pos-bl,.pos-br{left:5%;right:5%;bottom:14%;text-align:center;transform:none;}
  .pos-ml{left:5%;right:5%;text-align:center;transform:translateY(-50%);}
  .pos-tl,.pos-tr{left:5%;right:5%;text-align:center;transform:none;}
  #ctr{right:16px;bottom:18px;}#mbars{left:16px;bottom:18px;}
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-dot"></div>
  <div class="loader-dot"></div>
  <div class="loader-dot"></div>
</div>

<div id="grain"></div>
<div id="vig"></div>

<!-- INTRO -->
<div id="intro">
  <span class="i-pre" id="intro-pre">A story in music &amp; light</span>
  <h1 class="i-title" id="intro-title">For <em id="intro-em">Her</em></h1>
  <div class="i-rule"></div>
  <p class="i-sub" id="intro-sub">Kasoor &nbsp;·&nbsp; Baarishein &nbsp;·&nbsp; and more</p>
  <button class="pbtn" id="playBtn"><span class="ptri"></span><span id="play-label">Play</span></button>
</div>

<!-- PROGRESS -->
<div id="pw"><div id="pb"></div></div>

<!-- SONG LABEL -->
<div id="slbl"></div>

<!-- COUNTER -->
<div id="ctr"></div>

<!-- MUSIC BARS -->
<div id="mbars">
  <div class="mb"></div><div class="mb"></div><div class="mb"></div>
  <div class="mb"></div><div class="mb"></div>
</div>

<!-- STAGE -->
<div id="stage"></div>

<!-- END CARD -->
<div id="ec">
  <span class="e-pre" id="ec-pre">With everything</span>
  <p class="e-msg" id="ec-msg">Happy Birthday.</p>
  <p class="e-sub" id="ec-sub">Always yours to keep.</p>
  <div class="e-rule"></div>
  <p class="e-note" id="ec-note">Kasoor · Baarishein · Tum Hi Ho · Tera Yaar Hoon Main · Khairiyat</p>
  <button class="rbtn" id="replayBtn">Watch Again</button>
</div>

<!-- HIDDEN YT CONTAINER -->
<div id="ytc" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;pointer-events:none;"></div>

<!-- LOCAL AUDIO ELEMENTS (populated dynamically) -->
<div id="local-audio-container" style="display:none;"></div>

<script>
/* ═══════════════════════════════════════════════
   DEFAULT DATA
═══════════════════════════════════════════════ */
const DEFAULT_SONGS = [
  { title:"Kasoor — Prateek Kuhad",      ytId:"N3vQBQ3XPCY", start:30 },
  { title:"Baarishein — Atif Aslam",     ytId:"ixrSQoJ57WM", start:15 },
  { title:"Tum Hi Ho — Arijit Singh",    ytId:"Umqb9KENgmk", start:10 },
  { title:"Tera Yaar Hoon Main — Arijit",ytId:"f0Z1dOOzN5E", start:12 },
  { title:"Khairiyat — Arijit Singh",    ytId:"dBgtCsrR4xU", start:18 }
];
const DEFAULT_END = {
  pre:"With everything", title:"Happy Birthday.",
  sub:"Always yours to keep.",
  note:"Kasoor · Baarishein · Tum Hi Ho · Tera Yaar Hoon Main · Khairiyat",
  replay:"Watch Again"
};
const DEFAULT_INTRO = {
  pre:'A story in music & light', title:'For Her',
  em:'Her', sub:'', play:'Play'
};

/* ═══════════════════════════════════════════════
   ENGINE STATE
═══════════════════════════════════════════════ */
let SONGS  = [];
let SLIDES = [];
let cur       = -1;
let stTimer   = null;
let running   = false;
let activeSng = -1;
let pendingSng= -1;
let ytPlrs    = {};
let ytReady   = {};
let ytOk      = false;
let localAudios = {}; // index → <audio> element

const $stage  = document.getElementById('stage');
const $pb     = document.getElementById('pb');
const $pw     = document.getElementById('pw');
const $ctr    = document.getElementById('ctr');
const $mbars  = document.getElementById('mbars');
const $slbl   = document.getElementById('slbl');
const $intro  = document.getElementById('intro');
const $ec     = document.getElementById('ec');
const $ytc    = document.getElementById('ytc');
const $loader = document.getElementById('loader');

/* ═══════════════════════════════════════════════
   LOAD DATA
═══════════════════════════════════════════════ */
async function loadData() {
  let data = null;
  try {
    const saved = localStorage.getItem('forHerAdmin');
    if (saved) { data = JSON.parse(saved); }
  } catch(e) {}

  if (!data) {
    try {
      const res = await fetch('content.json?' + Date.now());
      if (res.ok) data = await res.json();
    } catch(e) {}
  }

  if (!data) data = { songs: DEFAULT_SONGS, endCard: DEFAULT_END, introText: DEFAULT_INTRO };

  SONGS  = (data.songs  && data.songs.length)  ? data.songs  : DEFAULT_SONGS;
  SLIDES = (data.slides && data.slides.length) ? normaliseSlides(data.slides) : [];

  /* Apply intro text */
  const it = data.introText || DEFAULT_INTRO;
  setTxt('intro-pre',  it.pre   || DEFAULT_INTRO.pre);
  // Build title with em highlight
  const introTitleEl = document.getElementById('intro-title');
  if (introTitleEl) {
    const titleText  = it.title || DEFAULT_INTRO.title;
    const emWord     = it.em    || DEFAULT_INTRO.em;
    if (emWord && titleText.includes(emWord)) {
      introTitleEl.innerHTML = titleText.replace(emWord, `<em id="intro-em">${escHtml(emWord)}</em>`);
    } else {
      introTitleEl.textContent = titleText;
    }
  }
  setTxt('play-label', it.play || DEFAULT_INTRO.play);

  // Subtitle: use custom if set, otherwise auto-generate from songs
  const customSub = it.sub && it.sub.trim();
  if (customSub) {
    setTxt('intro-sub', customSub);
  } else {
    const songNames = SONGS.map(s => s.title.split('—')[0].split('–')[0].trim()).join(' · ');
    setTxt('intro-sub', songNames);
  }

  /* Apply end card */
  const ec = data.endCard || DEFAULT_END;
  setTxt('ec-pre',  ec.pre    || DEFAULT_END.pre);
  setTxt('ec-msg',  ec.title  || DEFAULT_END.title);
  setTxt('ec-sub',  ec.sub    || DEFAULT_END.sub);
  setTxt('ec-note', ec.note   || DEFAULT_END.note);
  setTxt('replayBtn', ec.replay || DEFAULT_END.replay);

  /* Apply page title */
  if (data.pageTitle) document.title = data.pageTitle;

  return data;
}

function normaliseSlides(raw) {
  const kbMap = {'zoom-in':'kb-zi','zoom-out':'kb-zo','pan-right':'kb-pr','pan-left':'kb-pl','drift-up':'kb-du'};
  return raw.map(s => {
    const imgSrc = s.img || s.image || '';
    const kb     = kbMap[s.kenBurns] || s.kb || 'kb-zi';
    const lines  = (s.lines || []).map(ln => {
      if (ln.cls !== undefined) return ln;
      const parts = [];
      if (ln.delay) parts.push(`d${ln.delay}`);
      if (ln.color) parts.push(ln.color);
      if (ln.size)  parts.push(ln.size);
      if (ln.style) parts.push(ln.style);
      return { text: ln.text || '', cls: parts.join(' ') };
    });
    return {
      img : imgSrc,
      tint: s.tint || 'rgba(0,0,0,0.3)',
      kb, pos: s.pos || 'pos-bc',
      song: typeof s.song === 'number' ? s.song : 0,
      dur : s.dur || 9000,
      lines
    };
  });
}

function setTxt(id, txt) {
  const el = document.getElementById(id);
  if (el) el.textContent = txt;
}

/* ═══════════════════════════════════════════════
   BUILD SLIDES
═══════════════════════════════════════════════ */
function buildSlides() {
  $stage.innerHTML = '';
  SLIDES.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'slide';
    d.id = `sl-${i}`;
    d.innerHTML = `
      <div class="sbg ${s.kb}" style="background-image:url('${cssEsc(s.img)}')"></div>
      <div class="sovl"></div>
      <div class="stint" style="background:${cssEsc(s.tint)}"></div>
      <div class="lw ${s.pos}">
        ${(s.lines||[]).map(l=>`<span class="ll ${l.cls||''}">${escHtml(l.text)}</span>`).join('')}
      </div>`;
    $stage.appendChild(d);
  });
}

/* ═══════════════════════════════════════════════
   AUDIO — Dual: YouTube + Local File
═══════════════════════════════════════════════ */
function loadAudio() {
  const localContainer = document.getElementById('local-audio-container');
  localContainer.innerHTML = '';
  localAudios = {};

  SONGS.forEach((song, i) => {
    if (song.audioData) {
      // Local audio file
      const audio = document.createElement('audio');
      audio.preload = 'auto';
      const src = document.createElement('source');
      src.src  = song.audioData;
      src.type = song.audioType || 'audio/mpeg';
      audio.appendChild(src);
      audio.volume = 0;
      localContainer.appendChild(audio);
      localAudios[i] = audio;

      // Loop: when track ends, restart from start point
      audio.addEventListener('ended', () => {
        audio.currentTime = song.start || 0;
        audio.play().catch(()=>{});
      });
    }
  });

  // Only load YouTube API if there are YT songs
  const hasYT = SONGS.some(s => s.ytId && !s.audioData);
  if (hasYT) loadYT();
}

function loadYT() {
  if (window.YT && window.YT.Player) { onYouTubeIframeAPIReady(); return; }
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
}

window.onYouTubeIframeAPIReady = function () {
  ytOk = true;
  SONGS.forEach((song, i) => {
    if (song.audioData) return; // skip — using local audio
    if (!song.ytId)    return;
    const el = document.createElement('div');
    el.id = `yt-${i}`;
    $ytc.appendChild(el);
    ytPlrs[i] = new YT.Player(`yt-${i}`, {
      height:'1', width:'1',
      videoId: song.ytId,
      playerVars:{ start:song.start||0, autoplay:0, controls:0, disablekb:1, fs:0, modestbranding:1, rel:0, enablejsapi:1, origin:window.location.origin||'*' },
      events:{
        onReady      : e => onPlayerReady(e, i),
        onStateChange: e => onPlayerState(e, i)
      }
    });
  });
};

function onPlayerReady(event, idx) {
  ytReady[idx] = true;
  event.target.setVolume(0);
  event.target.mute();
  if (pendingSng === idx) playSong(idx);
}

function onPlayerState(event, idx) {
  if (event.data === YT.PlayerState.ENDED) {
    try { event.target.seekTo(SONGS[idx].start||0, true); event.target.playVideo(); } catch {}
  }
}

/* ─── PLAY SONG (handles both local + YT) ─── */
function playSong(idx) {
  if (localAudios[idx]) {
    // Local audio
    const a = localAudios[idx];
    a.currentTime = SONGS[idx].start || 0;
    a.play().catch(()=>{});
    fadeLocalVol(a, 0, 0.85, 2000);
    return;
  }
  // YouTube
  if (!ytOk || !ytReady[idx] || !ytPlrs[idx]) return;
  try {
    const p = ytPlrs[idx];
    p.unMute();
    p.seekTo(SONGS[idx].start||0, true);
    p.playVideo();
    fadeVol(p, 0, 85, 2000);
  } catch(e) {}
}

function switchSong(idx) {
  if (idx === activeSng) return;

  $slbl.classList.remove('on');
  setTimeout(() => {
    $slbl.textContent = SONGS[idx] ? SONGS[idx].title : '';
    $slbl.classList.add('on');
  }, 350);

  // Fade out all other songs
  SONGS.forEach((_, i) => {
    if (i === idx) return;
    if (localAudios[i]) {
      fadeLocalVol(localAudios[i], null, 0, 1200, () => {
        localAudios[i].pause();
      });
    } else if (ytPlrs[i] && ytReady[i]) {
      fadeVol(ytPlrs[i], null, 0, 1200, () => {
        try { ytPlrs[i].pauseVideo(); } catch {}
      });
    }
  });

  activeSng  = idx;
  pendingSng = idx;
  if (localAudios[idx]) {
    playSong(idx);
  } else if (ytOk && ytReady[idx]) {
    playSong(idx);
  }
}

/* ─── VOLUME FADERS ─── */
function fadeVol(player, from, to, duration, cb) {
  let current = from;
  if (current === null) { try { current = player.getVolume(); } catch { current = to > 0 ? 0 : 85; } }
  const steps = 30, interval = duration / steps, delta = (to - current) / steps;
  let step = 0;
  try { player.unMute(); } catch {}
  const iv = setInterval(() => {
    step++; current += delta;
    const vol = Math.round(Math.max(0, Math.min(100, current)));
    try { player.setVolume(vol); } catch {}
    if (step >= steps) {
      clearInterval(iv);
      try { player.setVolume(to); } catch {}
      if (cb) cb();
    }
  }, interval);
}

function fadeLocalVol(audio, from, to, duration, cb) {
  let current = from !== null ? from : audio.volume;
  const steps = 30, interval = duration / steps, delta = (to - current) / steps;
  let step = 0;
  const iv = setInterval(() => {
    step++; current += delta;
    audio.volume = Math.max(0, Math.min(1, current));
    if (step >= steps) {
      clearInterval(iv);
      audio.volume = to;
      if (cb) cb();
    }
  }, interval);
}

/* ═══════════════════════════════════════════════
   SLIDE ENGINE
═══════════════════════════════════════════════ */
function goSlide(idx) {
  if (idx >= SLIDES.length) { showEnd(); return; }
  const prev = cur; cur = idx;
  if (prev >= 0) {
    const pe = document.getElementById(`sl-${prev}`);
    if (pe) {
      pe.querySelectorAll('.ll').forEach(l => { l.classList.remove('in'); l.classList.add('out'); });
      setTimeout(() => pe.classList.remove('active'), 1500);
    }
  }
  const el = document.getElementById(`sl-${idx}`);
  const ob = el.querySelector('.sbg');
  if (ob) {
    const nb = document.createElement('div');
    nb.className = ob.className; nb.style.cssText = ob.style.cssText;
    ob.parentNode.replaceChild(nb, ob);
  }
  el.classList.add('active');
  const lls = el.querySelectorAll('.ll');
  lls.forEach(l => l.classList.remove('out'));
  requestAnimationFrame(() => requestAnimationFrame(() => lls.forEach(l => l.classList.add('in'))));

  const dur = SLIDES[idx].dur;
  $pb.style.transition = 'none'; $pb.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    $pb.style.transition = `width ${dur/1000}s linear`; $pb.style.width = '100%';
  }));

  $ctr.textContent = `${String(idx+1).padStart(2,'0')} / ${String(SLIDES.length).padStart(2,'0')}`;
  const sng = SLIDES[idx].song || 0;
  if (sng !== activeSng) switchSong(sng);

  clearTimeout(stTimer);
  stTimer = setTimeout(() => goSlide(cur+1), dur);
}

/* ═══════════════════════════════════════════════
   START / END / REPLAY
═══════════════════════════════════════════════ */
function start() {
  $intro.classList.add('gone');
  [$pw,$ctr,$mbars,$slbl].forEach(e => e.classList.add('on'));
  running = true;
  setTimeout(() => goSlide(0), 1600);
}

function showEnd() {
  running = false; $pb.style.width = '100%';
  SONGS.forEach((_, i) => {
    if (localAudios[i]) {
      fadeLocalVol(localAudios[i], null, 0, 2000, () => localAudios[i].pause());
    } else if (ytPlrs[i] && ytReady[i]) {
      fadeVol(ytPlrs[i], null, 0, 2000, () => { try { ytPlrs[i].pauseVideo(); } catch {} });
    }
  });
  setTimeout(() => $ec.classList.add('on'), 2000);
}

function replay() {
  $ec.classList.remove('on');
  cur = -1; activeSng = -1; pendingSng = -1;
  document.querySelectorAll('.slide').forEach(s => {
    s.classList.remove('active');
    s.querySelectorAll('.ll').forEach(l => l.classList.remove('in','out'));
  });
  running = true;
  setTimeout(() => goSlide(0), 800);
}

/* ═══════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (!running) return;
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); clearTimeout(stTimer); goSlide(cur+1); }
  if (e.key==='ArrowLeft')               { e.preventDefault(); clearTimeout(stTimer); goSlide(Math.max(0,cur-1)); }
});

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function cssEsc(str) { return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

/* ═══════════════════════════════════════════════
   STORAGE LISTENER — live update from admin tab
═══════════════════════════════════════════════ */
window.addEventListener('storage', async e => {
  if (e.key === 'forHerAdmin') {
    await loadData();
    buildSlides();
    loadAudio();
    cur = -1; activeSng = -1; pendingSng = -1;
    running = false;
    $ec.classList.remove('on');
    $intro.classList.remove('gone');
    [$pw,$ctr,$mbars,$slbl].forEach(el => el.classList.remove('on'));
  }
});

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
async function init() {
  await loadData();
  buildSlides();
  loadAudio();
  $loader.classList.add('gone');
  document.getElementById('playBtn').addEventListener('click', start);
  document.getElementById('replayBtn').addEventListener('click', replay);
}

init();
</script>
