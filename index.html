<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#08070d;--warm:#f5ede0;--amber:#e8a96a;--rose:#d4898a;--blue:#7aafd4;
  --fh:'Playfair Display',serif;--fb:'DM Sans',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);font-family:var(--fb);color:var(--warm);user-select:none;}

/* GRAIN */
#grain{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.038;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:150px;animation:grn .4s steps(3) infinite;}
@keyframes grn{0%{transform:translate(0,0)}33%{transform:translate(-3%,2%)}66%{transform:translate(2%,-3%)}100%{transform:translate(-1%,1%)}}

/* VIGNETTE */
#vig{position:fixed;inset:0;z-index:9998;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 45%,rgba(8,7,13,.65) 100%);}

/* INTRO */
#intro{position:fixed;inset:0;z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink);transition:opacity 2s ease,visibility 2s ease;}
#intro.gone{opacity:0;visibility:hidden;pointer-events:none;}
.i-pre{font-family:var(--fb);font-weight:200;font-size:clamp(9px,1.1vw,11px);letter-spacing:.4em;text-transform:uppercase;color:var(--amber);opacity:0;animation:riseIn 1s .4s forwards;}
.i-title{font-family:var(--fh);font-style:italic;font-weight:300;font-size:clamp(3.5rem,8vw,7rem);color:var(--warm);line-height:1.05;text-align:center;opacity:0;animation:riseIn 1.2s .9s forwards;}
.i-title em{color:var(--amber);}
.i-rule{width:1px;height:52px;background:var(--amber);opacity:0;margin:1.8rem 0;animation:fadeIn .8s 1.8s forwards;}
.i-sub{font-family:var(--fb);font-weight:200;font-size:clamp(10px,1.1vw,12px);letter-spacing:.28em;text-transform:uppercase;color:rgba(245,237,224,.45);opacity:0;animation:fadeIn .8s 2.1s forwards;margin-bottom:2.8rem;}
.pbtn{display:flex;align-items:center;gap:13px;padding:13px 36px;border:1px solid rgba(232,169,106,.35);background:rgba(232,169,106,.05);backdrop-filter:blur(8px);border-radius:2px;cursor:pointer;color:var(--amber);font-family:var(--fb);font-weight:300;font-size:11px;letter-spacing:.28em;text-transform:uppercase;opacity:0;animation:fadeIn .8s 2.6s forwards;transition:all .45s ease;}
.pbtn:hover{background:rgba(232,169,106,.12);border-color:rgba(232,169,106,.7);letter-spacing:.34em;}
.ptri{width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:9px solid var(--amber);flex-shrink:0;}

/* PROGRESS */
#pw{position:fixed;top:0;left:0;right:0;z-index:4000;height:2px;background:rgba(245,237,224,.05);opacity:0;transition:opacity 1s .5s;}
#pw.on{opacity:1;}
#pb{height:100%;width:0%;background:linear-gradient(to right,var(--rose),var(--amber));box-shadow:0 0 10px rgba(232,169,106,.7);transition:width .25s linear;}

/* SONG LABEL */
#slbl{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:4000;font-family:var(--fb);font-weight:200;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(232,169,106,.5);opacity:0;transition:opacity .6s;white-space:nowrap;}
#slbl.on{opacity:1;}

/* COUNTER */
#ctr{position:fixed;bottom:26px;right:28px;z-index:4000;font-family:var(--fb);font-weight:200;font-size:10px;letter-spacing:.2em;color:rgba(245,237,224,.22);opacity:0;transition:opacity 1s;}
#ctr.on{opacity:1;}

/* MUSIC BARS */
#mbars{position:fixed;bottom:26px;left:28px;z-index:4000;display:flex;align-items:flex-end;gap:3px;height:18px;opacity:0;transition:opacity .8s;}
#mbars.on{opacity:1;}
.mb{width:2px;border-radius:2px;background:rgba(232,169,106,.5);animation:mba 1s ease-in-out infinite alternate;}
.mb:nth-child(1){height:5px;animation-duration:.9s;animation-delay:0s}
.mb:nth-child(2){height:14px;animation-duration:1.1s;animation-delay:.15s}
.mb:nth-child(3){height:9px;animation-duration:.8s;animation-delay:.3s}
.mb:nth-child(4){height:16px;animation-duration:1.2s;animation-delay:.1s}
.mb:nth-child(5){height:7px;animation-duration:.95s;animation-delay:.25s}
@keyframes mba{from{transform:scaleY(.25)}to{transform:scaleY(1)}}

/* STAGE */
#stage{position:fixed;inset:0;z-index:1;}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 1.5s cubic-bezier(.4,0,.2,1);will-change:opacity;}
.slide.active{opacity:1;}
.sbg{position:absolute;inset:-10%;background-size:cover;background-position:center;will-change:transform;}
.kb-zi{animation:kbZI 20s ease-out forwards;}
.kb-zo{animation:kbZO 20s ease-out forwards;}
.kb-pr{animation:kbPR 20s ease-out forwards;}
.kb-pl{animation:kbPL 20s ease-out forwards;}
.kb-du{animation:kbDU 20s ease-out forwards;}
@keyframes kbZI{from{transform:scale(1)}to{transform:scale(1.14)}}
@keyframes kbZO{from{transform:scale(1.14)}to{transform:scale(1)}}
@keyframes kbPR{from{transform:scale(1.08) translateX(-4%)}to{transform:scale(1.08) translateX(4%)}}
@keyframes kbPL{from{transform:scale(1.08) translateX(4%)}to{transform:scale(1.08) translateX(-4%)}}
@keyframes kbDU{from{transform:scale(1.06) translateY(-3%)}to{transform:scale(1.06) translateY(3%)}}
.sovl{position:absolute;inset:0;background:linear-gradient(160deg,rgba(8,7,13,.1) 0%,rgba(8,7,13,.04) 40%,rgba(8,7,13,.7) 100%);}
.stint{position:absolute;inset:0;mix-blend-mode:multiply;}

/* LYRIC SYSTEM */
.lw{position:absolute;z-index:10;max-width:min(740px,88vw);}
.pos-bl{bottom:12%;left:6%;text-align:left;}
.pos-bc{bottom:12%;left:50%;transform:translateX(-50%);text-align:center;}
.pos-br{bottom:12%;right:6%;text-align:right;}
.pos-ml{top:50%;left:6%;transform:translateY(-50%);text-align:left;}
.pos-mc{top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.pos-tl{top:15%;left:6%;text-align:left;}
.pos-tc{top:15%;left:50%;transform:translateX(-50%);text-align:center;}
.pos-tr{top:15%;right:6%;text-align:right;}

.ll{display:block;font-family:var(--fh);font-style:italic;font-weight:300;
  font-size:clamp(1.5rem,3.3vw,2.9rem);line-height:1.42;color:var(--warm);
  text-shadow:0 3px 40px rgba(0,0,0,.92),0 1px 8px rgba(0,0,0,.8);
  opacity:0;transform:translateY(18px);
  transition:opacity 1.1s ease,transform 1.1s ease;}
.ll.in{opacity:1;transform:translateY(0);}
.ll.out{opacity:0;transform:translateY(-10px);transition:opacity .8s ease,transform .8s ease;}
.ll.gold{color:var(--amber);}
.ll.rose{color:#e8b0b0;}
.ll.blue{color:#a4cce4;}
.ll.big{font-size:clamp(2.1rem,5.2vw,4.8rem);font-weight:400;}
.ll.sm{font-size:clamp(.9rem,1.8vw,1.4rem);font-style:normal;font-family:var(--fb);font-weight:200;letter-spacing:.06em;}
.ll.caps{font-style:normal;letter-spacing:.28em;font-size:clamp(.7rem,1vw,.95rem);font-family:var(--fb);font-weight:200;}
.d1{transition-delay:.25s}.d2{transition-delay:.75s}.d3{transition-delay:1.25s}.d4{transition-delay:1.75s}

/* END CARD */
#ec{position:fixed;inset:0;z-index:4500;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink);opacity:0;pointer-events:none;transition:opacity 2.5s ease;}
#ec.on{opacity:1;pointer-events:all;}
.e-pre{font-family:var(--fb);font-weight:200;font-size:10px;letter-spacing:.45em;text-transform:uppercase;color:var(--amber);opacity:0;}
#ec.on .e-pre{animation:riseIn 1.2s .5s forwards;}
.e-msg{font-family:var(--fh);font-style:italic;font-size:clamp(2.4rem,6vw,5.5rem);font-weight:300;color:var(--warm);text-align:center;line-height:1.2;margin:.9rem 0 .2rem;opacity:0;}
#ec.on .e-msg{animation:riseIn 1.4s 1s forwards;}
.e-sub{font-family:var(--fh);font-style:italic;font-weight:300;font-size:clamp(1rem,2.1vw,1.5rem);color:var(--amber);opacity:0;}
#ec.on .e-sub{animation:riseIn 1.2s 1.6s forwards;}
.e-rule{width:60px;height:1px;background:var(--amber);margin:2rem auto;opacity:0;}
#ec.on .e-rule{animation:fadeIn .8s 2.2s forwards;}
.e-note{font-family:var(--fb);font-weight:200;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(245,237,224,.35);text-align:center;opacity:0;}
#ec.on .e-note{animation:fadeIn .8s 2.6s forwards;}
.rbtn{margin-top:2.5rem;padding:11px 32px;background:transparent;border:1px solid rgba(232,169,106,.22);color:rgba(232,169,106,.45);font-family:var(--fb);font-weight:200;font-size:10px;letter-spacing:.28em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .4s;opacity:0;}
#ec.on .rbtn{animation:fadeIn .8s 3.2s forwards;}
.rbtn:hover{border-color:var(--amber);color:var(--amber);}

/* KEYFRAMES */
@keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* MOBILE */
@media(max-width:600px){
  .pos-bl,.pos-br{left:5%;right:5%;bottom:14%;text-align:center;transform:none;}
  .pos-ml{left:5%;right:5%;text-align:center;transform:translateY(-50%);}
  .pos-tl,.pos-tr{left:5%;right:5%;text-align:center;transform:none;}
  #ctr{right:16px;bottom:18px;}#mbars{left:16px;bottom:18px;}
}
</style>

const $pw    = document.getElementById('pw');
const $ctr   = document.getElementById('ctr');
const $mbars = document.getElementById('mbars');
const $slbl  = document.getElementById('slbl');
const $intro = document.getElementById('intro');
const $ec    = document.getElementById('ec');

/* BUILD */
function buildSlides() {
  SLIDES.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'slide'; d.id = `sl-${i}`;
    d.innerHTML = `
      <div class="sbg ${s.kb}" style="background-image:url('${s.img}')"></div>
      <div class="sovl"></div>
      <div class="stint" style="background:${s.tint}"></div>
      <div class="lw ${s.pos}">
        ${s.lines.map(l=>`<span class="ll ${l.cls||''}">${l.text}</span>`).join('')}
      </div>`;
    $stage.appendChild(d);
  });
}

/* GO TO SLIDE */
function goSlide(idx) {
  if (idx >= SLIDES.length) { showEnd(); return; }
  const prev = cur; cur = idx;

  if (prev >= 0) {
    const pe = document.getElementById(`sl-${prev}`);
    if (pe) {
      pe.querySelectorAll('.ll').forEach(l => { l.classList.remove('in'); l.classList.add('out'); });
      setTimeout(() => pe.classList.remove('active'), 1500);
    }
  }

  const el = document.getElementById(`sl-${idx}`);
  /* Reset Ken Burns by cloning bg node */
  const ob = el.querySelector('.sbg');
  const nb = ob.cloneNode(false); nb.className = ob.className; nb.style.cssText = ob.style.cssText;
  ob.parentNode.replaceChild(nb, ob);
  el.classList.add('active');

  /* Lyrics */
  const lls = el.querySelectorAll('.ll');
  lls.forEach(l => { l.classList.remove('out'); });
  requestAnimationFrame(() => requestAnimationFrame(() => lls.forEach(l => l.classList.add('in'))));

  /* Progress */
  const dur = SLIDES[idx].dur;
  $pb.style.transition = 'none'; $pb.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    $pb.style.transition = `width ${dur/1000}s linear`;
    $pb.style.width = '100%';
  }));

  $ctr.textContent = `${String(idx+1).padStart(2,'0')} / ${String(SLIDES.length).padStart(2,'0')}`;

  const sng = SLIDES[idx].song;
  if (sng !== activeSng) { activeSng = sng; switchSong(sng); }

  clearTimeout(stTimer);
  stTimer = setTimeout(() => goSlide(cur + 1), dur);
}

/* YOUTUBE */
function loadYT() {
  const t = document.createElement('script');
  t.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(t);
}

window.onYouTubeIframeAPIReady = function() {
  ytOk = true;
  const wrap = document.getElementById('ytc');
  SONGS.forEach((s, i) => {
    const el = document.createElement('div'); el.id = `yt-${i}`; wrap.appendChild(el);
    ytPlrs[i] = new YT.Player(`yt-${i}`, {
      height:'1', width:'1', videoId: s.ytId,
      playerVars: { start:s.start, autoplay:0, controls:0, disablekb:1, fs:0, modestbranding:1, rel:0 },
      events: { onReady: e => e.target.setVolume(0) }
    });
  });
};

function switchSong(idx) {
  $slbl.classList.remove('on');
  setTimeout(() => { $slbl.textContent = SONGS[idx].title; $slbl.classList.add('on'); }, 350);
  if (!ytOk) return;
  SONGS.forEach((_, i) => {
    if (i !== idx && ytPlrs[i]) fadeVol(ytPlrs[i], 0, () => { try{ytPlrs[i].pauseVideo();}catch{} });
  });
  if (ytPlrs[idx]) {
    try { ytPlrs[idx].seekTo(SONGS[idx].start, true); ytPlrs[idx].playVideo(); fadeVol(ytPlrs[idx], 82); }
    catch(e){}
  }
}

function fadeVol(player, to, cb) {
  let v = 0; try { v = player.getVolume()||0; } catch{}
  const step = to > v ? 3 : -3;
  const iv = setInterval(() => {
    v += step;
    if ((step>0&&v>=to)||(step<0&&v<=to)) { v=to; clearInterval(iv); if(cb) cb(); }
    try { player.setVolume(Math.max(0,Math.min(100,v))); } catch{}
  }, 80);
}

/* START */
function start() {
  $intro.classList.add('gone');
  [$pw,$ctr,$mbars,$slbl].forEach(e => e.classList.add('on'));
  running = true;
  setTimeout(() => goSlide(0), 1600);
}

/* END */
function showEnd() {
  running = false; $pb.style.width = '100%';
  SONGS.forEach((_,i) => { if(ytPlrs[i]) fadeVol(ytPlrs[i],0,()=>{ try{ytPlrs[i].pauseVideo();}catch{} }); });
  setTimeout(() => $ec.classList.add('on'), 2000);
}

/* REPLAY */
function replay() {
  $ec.classList.remove('on'); cur=-1; activeSng=-1;
  document.querySelectorAll('.slide').forEach(s => {
    s.classList.remove('active');
    s.querySelectorAll('.ll').forEach(l => l.classList.remove('in','out'));
  });
  running = true;
  setTimeout(() => goSlide(0), 800);
}

/* KEYBOARD: → / Space = next, ← = prev */
document.addEventListener('keydown', e => {
  if (!running) return;
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); clearTimeout(stTimer); goSlide(cur+1); }
  if (e.key==='ArrowLeft') { e.preventDefault(); clearTimeout(stTimer); goSlide(Math.max(0,cur-1)); }
});

/* INIT */
document.getElementById('playBtn').addEventListener('click', start);
buildSlides();
loadYT();
</script>
</body>
</html>
